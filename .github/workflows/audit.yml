name: Security Audit

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
    schedule:
        # Ogni lunedì alle 07:00 UTC
        - cron: "0 7 * * 1"

jobs:
    audit:
        name: npm audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run npm audit
              run: npm audit --audit-level=high
              # Fallisce solo su HIGH o CRITICAL, non su moderate (build-time)
